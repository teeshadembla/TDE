# .github/workflows/deploy.yml
# Deploys frontend to S3+CloudFront and backend to EC2

name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  # ── 1. Run tests first ────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Run tests
        working-directory: ./server
        run: npm test
        env:
          NODE_ENV: test
          STRIPE_SECRET_KEY: sk_test_mock_key_for_ci_testing
          MONGO_USER: test_user
          MONGO_PASS: test_password
          ACCESS_SECRET: test_access_secret
          REFRESH_SECRET: test_refresh_secret
          JWT_SECRET: test_jwt_secret
          PORT: 8080

  # ── 2. Build React app and push to S3, then clear CloudFront cache ────
  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build frontend
        working-directory: ./client
        run: npm run build
        env:
          # These become baked into the JS bundle at build time
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Sync build output to S3 — --delete removes files no longer in dist/
      - name: Upload build to S3
        run: |
          aws s3 sync ./client/dist s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html must NOT be cached — browsers always need the latest version
          aws s3 cp ./client/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      # Tell CloudFront to forget its cached files so users get the new version
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── 3. SSH into EC2, pull latest code, restart the Node server ────────
  deploy-backend:
    name: Deploy Backend (EC2)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            set -e
            cd ~/TDE
            git pull origin main
            cd server
            npm install --omit=dev
            pm2 restart tde-server --update-env || pm2 start index.js --name tde-server
            pm2 save

      - name: Health check
        run: |
          sleep 20
          curl -f http://${{ secrets.EC2_HOST }}/api/health || exit 1
